<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyTasks | Modern To-Do App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="todo-card">
      <div class="header">
        <div>
          <p class="subtitle">Daily Planner</p>
          <h1>MyTasks</h1>
        </div>

        <button class="theme-btn" id="themeBtn" aria-label="Change theme">
          🌙
        </button>
      </div>

      <form class="task-form" id="taskForm">
        <input 
          type="text" 
          id="taskInput" 
          placeholder="Add a new task..."
          autocomplete="off"
        />
        <button type="submit">Add</button>
      </form>

      <div class="stats">
        <div>
          <span id="totalTasks">0</span>
          <p>Total</p>
        </div>
        <div>
          <span id="activeTasks">0</span>
          <p>Active</p>
        </div>
        <div>
          <span id="completedTasks">0</span>
          <p>Done</p>
        </div>
      </div>

      <div class="filters">
        <button class="filter active" data-filter="all">All</button>
        <button class="filter" data-filter="active">Active</button>
        <button class="filter" data-filter="completed">Completed</button>
      </div>

      <ul class="task-list" id="taskList"></ul>

      <button class="clear-btn" id="clearCompleted">
        Clear completed
      </button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
